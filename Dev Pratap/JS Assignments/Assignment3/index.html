<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.js"
        integrity="sha512-+k1pnlgt4F1H8L7t3z95o3/KO+o78INEcXTbnoJQ/F2VqDVhWoaiVml/OEHv9HsVgxUaVW+IbiZPUJQfF/YxZw=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main">
        <h1>Signup Form</h1>
        <div id="headings-level">
            <p>Name</p>
            <p>Contact</p>
            <p>Birth</p>
            <p>submit</p>
        </div>
        <div id="headings-level-circle">
            <div class="circle level1">1</div>
            <hr class="level1">
            <div class="circle level2">2</div>
            <hr class="level2">
            <div class="circle level3">3</div>
            <hr class="level3">
            <div class="circle level4">4</div>
        </div>

        <form id="form-1" class="">
            <h1>Basic Info:</h1>
            <label for="fname">First name</label><input type="text" id="fname">
            <label for="lname">Last name</label><input type="text" id="lname">
            <div class="btn-box">
                <button class="btn" id="btn1-next" type="button">Next</button>
            </div>

        </form>
        <form id="form-2" class="hidden-form">
            <h1>Contact Info:</h1>
            <label for="gmail">Email Address</label><input type="text" id="gmail">
            <label for="phone">Phone Number</label><input type="number" id="phone">
            <div class="btn-box">
                <button class="btn btn-pre" id="btn2-pre" type="button">previous</button>
                <button class="btn btn-next" id="btn2-next" type="button">Next</button>
            </div>

        </form>
        <form id="form-3" class="hidden-form">
            <h1>Date of Birth</h1>
            <label for="date">Date</label><input type="date" id="date">
            <select name="gender" id="gender">
                <option value="male">male</option>
                <option value="female">Female</option>
                <option value="others">Others</option>
            </select>
            <div class="btn-box">
                <button class="btn btn-pre" id="btn3-pre" type="button">previous</button>
                <button class="btn btn-next" id="btn3-next" type="button">Next</button>
            </div>

        </form>
        <form id="form-4" class="hidden-form">
            <label for="password">Username</label><input type="text" id="username">
            <label for="password">Password</label><input type="password" id="password">
            <div class="btn-box">
                <button class="btn btn-pre" id="btn4-pre" type="button">previous</button>
                <button class="btn btn-next" id="btn4-next" type="button">Next</button>
            </div>

        </form>
        <div class="hidden-form" id="final-page">
            <h1>Form submited</h1>
        </div>
    </div>
   <script src="script.js"></script>
</body>

</html>
