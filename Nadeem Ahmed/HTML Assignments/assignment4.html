<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
</head>

<body>
    <h1>
        <center>Contact Details</center>
    </h1>
    <div>
        <p style="padding-left: 570px; font-size: 18px;">
            <b>Please enter your personal details: </b>
        </p>
        <div style="margin-left: 620px">
            <label for="fname">First name:*</label>
            <input type="text" name="fname" placeholder="Fred" />
        </div>
        <br />
        <div style="margin-left: 621px">
            <label for="lname">Last name:*</label>
            <input type="text" name="lname" placeholder="Bloggs" />
        </div>
        <br />
        <div style="margin-left: 597px">
            <label for="address">Street address:*</label>
            <input style="width: 300px" type="text" name="address" placeholder="Station Road" />
        </div>
        <br />
        <div style="margin-left: 619px">
            <label for="city">Town/City:*</label>
            <input type="text" name="city" placeholder="Dorkwell" />
        </div>
        <br />
        <div style="margin-left: 606px">
            <label for="zip">Postcode/zip:*</label>
            <input style="width: 5.5rem;" type="text" name="zip" placeholder="DW1 56A" />
        </div>
        <br />
        <div style="margin-left: 621px">
            <label for="tel">Telephone:*</label>
            <input type="text" name="tel" placeholder="0123 456789" />
        </div>
        <br />
        <div style="margin-left: 642px">
            <label for="mobile">Mobile:*</label>
            <input type="text" name="mobile" placeholder="01567 899876" />
        </div>
        <br />
         <div style="margin-left: 597px">
            <label for="email">Email address:*</label>
            <input style="width: 310px;" type="text" name="email" placeholder="fbloggs@coldmail.net" />
            <p style="padding-left: 8rem;">Fields marked * are required.</p>
        </div>
        <div style="padding-left: 48rem; padding-top: 0px ;">
            <button type="submit">Submit</button>
        </div>
        
    </div>
</body>

</html>
