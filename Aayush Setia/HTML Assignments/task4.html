<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>form</title>
    <style>
         <!-- form{
            text-align: center;
         } -->
         .container{
            text-align: center;
            border: 1px solid black;
         }

         
    </style>
  </head>
  <body>
    <div class="container">
        <h1>Contact Details</h1>
      <p />Please enter your personal details</p>
      <form>
        <div class="details">
            <div>
                <label for="f.name">First Name</label>
                <input type="text" id="f.name" placeholder="First Name">
            </div>
             <div>
                <label for="l.name">Last Name</label>
                <input type="text" id="l.name" placeholder="Last Name">
            </div>
             <div>
                <label for="s.add">Street address</label>
                <input type="text" id="s.add" placeholder="Street address">
            </div>

             <div>
                <label >Town/city</label>
                <input type="text"  placeholder="Town/City">
            </div>

             <div>
                <label>Postcode/Zip</label>
                <input type="text"  placeholder="Postcode/zip">
            </div>

             <div>
                <label >Telephone</label>
                <input type="number"  placeholder="Telephone">
            </div>

             <div>
                <label >Mobile</label>
                <input type="number"  placeholder="Mobile number">
            </div>

             <div>
                <label >Email address</label>
                <input type="text"  placeholder="email">
            </div>

            <p style="font-size: 12px;">Field marked * are required </p>

            <button>Submit</button>




        </div>
      </form>
    </div>
  </body>
</html>
